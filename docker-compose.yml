services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: right-answer-postgres
    environment:
      POSTGRES_DB: right_answer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d right_answer"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: right-answer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: right-answer-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: right-answer-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/right_answer
      REDIS_URL: redis://redis:6379
      JWT_SECRET: right-answer-dev-secret
      PORT: 4000
      APP_URL: http://localhost:3000
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: right_answer_textbook_chunks
      AI_METHOD: ${AI_METHOD:-openrouter}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      HACKAI_API_KEY: ${HACKAI_API_KEY:-}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      AI_MODEL_FAMILY: ${AI_MODEL_FAMILY:-gemma}
      AI_SIMPLE_MODEL: ${AI_SIMPLE_MODEL:-google/gemma-3-12b-it}
      AI_REASONING_MODEL: ${AI_REASONING_MODEL:-google/gemma-4-31b-it}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-perplexity/pplx-embed-v1-0.6b}
      AI_RERANK_MODEL: ${AI_RERANK_MODEL:-nvidia/rerank-qa-mistral-4b}
      AI_VLM_THINKING_MODEL: ${AI_VLM_THINKING_MODEL:-qwen/qwen3-vl-8b-thinking}
      AI_VLM_INSTRUCT_MODEL: ${AI_VLM_INSTRUCT_MODEL:-qwen/qwen3-vl-8b-instruct}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: right-answer-web
    depends_on:
      api:
        condition: service_started
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "3000:80"

  workers:
    build:
      context: .
      dockerfile: apps/workers/Dockerfile
    container_name: right-answer-workers
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/right_answer
      REDIS_URL: redis://redis:6379
    command: >
      sh -lc "pnpm --filter @right-answer/workers start"

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
