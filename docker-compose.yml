services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: right-answer-postgres
    environment:
      POSTGRES_DB: right_answer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d right_answer"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: right-answer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: right-answer-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/right_answer
      REDIS_URL: redis://redis:6379
      JWT_SECRET: right-answer-dev-secret
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    command: >
      sh -lc "pnpm --filter @right-answer/database prisma db push &&
      pnpm db:seed &&
      pnpm --filter @right-answer/api start"
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: right-answer-web
    depends_on:
      api:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    ports:
      - "3000:3000"

  workers:
    build:
      context: .
      dockerfile: apps/workers/Dockerfile
    container_name: right-answer-workers
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/right_answer
      REDIS_URL: redis://redis:6379
    command: >
      sh -lc "pnpm --filter @right-answer/workers start"

volumes:
  postgres_data:
  redis_data:
