name: Flutter Build APK

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # allow manual trigger from GitHub UI
    inputs:
      build_type:
        description: 'Build type (debug / release)'
        required: false
        default: 'release'

env:
  FLUTTER_VERSION: '3.41.7'
  JAVA_VERSION: '17'

jobs:
  # ── Analysis & tests ──────────────────────────────────────────────────────
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Dart analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

  # ── Debug APK ─────────────────────────────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug --dart-define=OPENAI_API_KEY=${{ env.OPENAI_API_KEY }}

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: right-answer-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  # ── Release APK ───────────────────────────────────────────────────────────
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: analyze
    # Only build release on push to main/master (not every PR)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # ── Keystore setup (optional – only runs if secrets are set) ──────────
      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: Write key.properties
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      # ── Build split APKs per ABI (smallest download size) ────────────────
      - name: Build release APKs (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Upload release APKs
        uses: actions/upload-artifact@v4
        with:
          name: right-answer-release-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/
          retention-days: 30

      # ── Also build a fat universal APK for easy sideloading ──────────────
      - name: Build universal release APK
        run: flutter build apk --release

      - name: Upload universal APK
        uses: actions/upload-artifact@v4
        with:
          name: right-answer-universal-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ── Create GitHub Release (on version tags) ───────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download release APKs
        uses: actions/download-artifact@v4
        with:
          name: right-answer-release-${{ github.run_number }}
          path: ./apks/

      - name: Download universal APK
        uses: actions/download-artifact@v4
        with:
          name: right-answer-universal-${{ github.run_number }}
          path: ./apks/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: ./apks/**
          generate_release_notes: true
          body: |
            ## RightAnswer ${{ github.ref_name }}

            ### Download
            - **app-release.apk** — Universal APK (all devices, larger size)
            - **app-arm64-v8a-release.apk** — Arm 64-bit (most modern Android phones)
            - **app-armeabi-v7a-release.apk** — Arm 32-bit (older devices)
            - **app-x86_64-release.apk** — x86 64-bit (emulators, some Chromebooks)
